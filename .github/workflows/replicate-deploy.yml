name: Deploy To Replicate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}

      - name: Validate Secret
        env:
          REPLICATE_CLI_AUTH_TOKEN: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}
        run: |
          if [ -z "${REPLICATE_CLI_AUTH_TOKEN:-}" ]; then
            echo "Missing REPLICATE_CLI_AUTH_TOKEN repository secret"
            exit 1
          fi

      - name: Push Model
        run: |
          cog push r8.im/likw99/voice-cloning-create-dataset-public
